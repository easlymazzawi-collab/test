<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cursor Chat Studio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell" id="appShell">
      <aside class="history-sidebar">
        <div class="brand">
          <div class="brand-mark">C</div>
          <div>
            <h1>Cursor Chat</h1>
            <p>Cloud agent workspace</p>
          </div>
        </div>

        <button id="newChatButton" class="primary-soft full" type="button">
          + Chat mới
        </button>

        <div class="history-head">
          <span>Đoạn chat</span>
          <button id="clearAllChatsButton" class="icon-button" type="button" title="Xoá toàn bộ chat">
            Xoá
          </button>
        </div>
        <div id="conversationList" class="conversation-list"></div>

        <details class="settings-card" open>
          <summary>
            <span>Cấu hình</span>
            <span id="connectionState" class="status-dot">ready</span>
          </summary>

          <label class="field">
            <span>Cursor API key</span>
            <input
              id="apiKeyInput"
              type="password"
              autocomplete="off"
              placeholder="CURSOR_API_KEY hoặc dán key"
            />
          </label>

          <label class="check-row">
            <input id="rememberKeyInput" type="checkbox" />
            <span>Lưu key trong trình duyệt này</span>
          </label>

          <label class="field">
            <span>GitHub repo URL</span>
            <input id="repoUrlInput" type="url" placeholder="https://github.com/org/repo" />
          </label>

          <div class="two-col">
            <label class="field">
              <span>Starting ref</span>
              <input id="startingRefInput" type="text" placeholder="main" />
            </label>
            <label class="field">
              <span>PR URL</span>
              <input id="prUrlInput" type="url" placeholder="Tuỳ chọn" />
            </label>
          </div>

          <div class="two-col">
            <label class="field">
              <span>Mode</span>
              <select id="modeInput">
                <option value="agent">Agent</option>
                <option value="plan">Plan</option>
              </select>
            </label>
            <label class="field">
              <span>Agent ID</span>
              <input id="agentIdInput" type="text" placeholder="Tự tạo" />
            </label>
          </div>

          <label class="check-row">
            <input id="autoPrInput" type="checkbox" checked />
            <span>Tự tạo PR nếu agent push code</span>
          </label>
          <label class="check-row">
            <input id="currentBranchInput" type="checkbox" />
            <span>Làm trên branch hiện tại</span>
          </label>

          <div class="run-card">
            <div>
              <span>Run</span>
              <strong id="runStatus">idle</strong>
            </div>
            <a id="agentLink" class="hidden" href="#" target="_blank" rel="noreferrer">
              Mở Cursor
            </a>
          </div>
        </details>
      </aside>

      <main class="chat-panel">
        <header class="chat-topbar">
          <div>
            <p class="eyebrow">Cursor Cloud Agent</p>
            <h2 id="chatTitle">Chat mới</h2>
          </div>
          <div class="topbar-actions">
            <button id="toggleCodeButton" class="secondary-button" type="button">
              Code
            </button>
            <button id="clearChatButton" class="secondary-button" type="button">
              Xoá chat này
            </button>
          </div>
        </header>

        <section id="messageList" class="message-list" aria-live="polite"></section>

        <form id="composerForm" class="composer">
          <div id="imagePreviewList" class="image-preview-list"></div>
          <div class="composer-surface">
            <textarea
              id="promptInput"
              rows="1"
              placeholder="Nhắn Cursor Agent..."
            ></textarea>
            <div class="composer-tools">
              <div class="left-tools">
                <label class="chip upload-chip">
                  <input id="imageInput" type="file" accept="image/png,image/jpeg,image/gif,image/webp" multiple />
                  Ảnh
                </label>
                <button id="clearImagesButton" class="chip hidden" type="button">Bỏ ảnh</button>
                <label class="chip check-chip">
                  <input id="includeCodeInput" type="checkbox" />
                  Gửi code
                </label>
                <button id="newFileButton" class="chip" type="button">Viết code</button>
              </div>
              <div class="right-tools">
                <label class="model-picker">
                  <span id="modelStatus">fallback</span>
                  <select id="modelInput">
                    <option value="">Đang tải model...</option>
                  </select>
                </label>
                <button id="sendButton" class="send-button" type="submit">Gửi</button>
              </div>
            </div>
          </div>
        </form>
      </main>

      <aside id="codePanel" class="code-panel">
        <div class="code-head">
          <div>
            <p class="eyebrow">Code workspace</p>
            <h2>Viết / sửa code</h2>
          </div>
          <button id="closeCodeButton" class="icon-button" type="button">Đóng</button>
        </div>

        <div id="fileTabs" class="file-tabs"></div>

        <div id="codeEmptyState" class="code-empty">
          <div class="empty-icon">⌁</div>
          <h3>Chưa có code</h3>
          <p>Code block agent trả về sẽ tự thành tab ở đây. Hoặc bấm "Viết code" để tạo file nháp.</p>
        </div>

        <div id="editorShell" class="editor-shell hidden">
          <div class="editor-meta">
            <label class="field">
              <span>Tên file</span>
              <input id="fileNameInput" type="text" />
            </label>
            <label class="field">
              <span>Ngôn ngữ</span>
              <select id="languageInput">
                <option value="typescript">TypeScript</option>
                <option value="javascript">JavaScript</option>
                <option value="tsx">TSX</option>
                <option value="jsx">JSX</option>
                <option value="python">Python</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="json">JSON</option>
                <option value="markdown">Markdown</option>
                <option value="text">Text</option>
              </select>
            </label>
          </div>

          <textarea id="codeEditor" class="code-editor" spellcheck="false"></textarea>

          <div class="workspace-actions">
            <button id="copyCodeButton" class="secondary-button" type="button">Copy</button>
            <button id="insertPromptButton" class="secondary-button" type="button">Chèn vào chat</button>
          </div>
        </div>
      </aside>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
